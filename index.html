<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bố Kiên iOS 🇻🇳</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(170deg,#FFD580 0%,#87CEEB 30%,#4FC3F7 60%,#0288D1 100%);
  min-height:100vh;overflow-x:hidden;color:#fff;position:relative;
}

/* SUN */
.sun{
  position:fixed;top:28px;right:28px;width:90px;height:90px;
  background:radial-gradient(circle,#FFF176 30%,#FFD600 70%,#FF8F00 100%);
  border-radius:50%;z-index:1;
  box-shadow:0 0 0 18px rgba(255,230,80,0.18),0 0 60px #FFD600;
  animation:sunPulse 4s ease-in-out infinite;
}
.sun::before{
  content:'';position:absolute;inset:-30px;border-radius:50%;
  background:repeating-conic-gradient(rgba(255,230,80,0.13) 0deg 10deg,transparent 10deg 20deg);
  animation:rotateSun 20s linear infinite;
}
@keyframes sunPulse{0%,100%{box-shadow:0 0 0 18px rgba(255,230,80,0.18),0 0 60px #FFD600;}50%{box-shadow:0 0 0 30px rgba(255,230,80,0.22),0 0 90px #FFD600;}}
@keyframes rotateSun{to{transform:rotate(360deg)}}

/* CLOUDS */
.clouds{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:1;}
.cloud{position:absolute;background:rgba(255,255,255,0.85);border-radius:50px;filter:blur(2px);}
.cloud::before,.cloud::after{content:'';position:absolute;background:rgba(255,255,255,0.85);border-radius:50%;}
.cloud1{width:110px;height:35px;top:70px;left:-140px;animation:cloudMove 22s linear infinite;}
.cloud1::before{width:55px;height:55px;top:-28px;left:15px;}
.cloud1::after{width:38px;height:38px;top:-18px;left:55px;}
.cloud2{width:80px;height:26px;top:120px;left:-100px;animation:cloudMove 30s linear 8s infinite;opacity:.7;}
.cloud2::before{width:40px;height:40px;top:-20px;left:10px;}
.cloud2::after{width:30px;height:30px;top:-14px;left:40px;}
@keyframes cloudMove{from{transform:translateX(0);}to{transform:translateX(calc(100vw + 200px));}}

/* BIRDS */
.birds{position:fixed;top:90px;left:0;width:100%;pointer-events:none;z-index:1;}
.bird{position:absolute;width:22px;height:6px;border-top:3px solid rgba(255,255,255,0.7);border-radius:50% 50% 0 0/6px 6px 0 0;}
.bird::after{content:'';position:absolute;right:-11px;top:-3px;width:11px;height:6px;border-top:3px solid rgba(255,255,255,0.7);border-radius:50% 50% 0 0/6px 6px 0 0;}
.bird1{left:10%;animation:birdFly 18s linear infinite,birdFlap .5s ease-in-out infinite alternate;}
.bird2{left:20%;top:20px;animation:birdFly 24s linear 4s infinite,birdFlap .4s ease-in-out infinite alternate;}
.bird3{left:5%;top:35px;animation:birdFly 20s linear 10s infinite,birdFlap .6s ease-in-out infinite alternate;}
@keyframes birdFly{from{transform:translateX(0);}to{transform:translateX(110vw);}}
@keyframes birdFlap{from{transform:scaleY(1);}to{transform:scaleY(0.5);}}

/* SPARKLES */
.sparkle{position:fixed;width:6px;height:6px;background:#FFD600;border-radius:50%;pointer-events:none;z-index:2;animation:sparkleFade 3s ease-in-out infinite;}
@keyframes sparkleFade{0%,100%{opacity:0;transform:scale(0);}50%{opacity:1;transform:scale(1);}}

/* MUSIC BTN */
.music-btn{
  position:fixed;top:28px;left:20px;z-index:100;
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.25);backdrop-filter:blur(10px);
  border:2px solid rgba(255,255,255,0.5);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,0.15);
  transition:transform .2s;
}
.music-btn:hover{transform:scale(1.1);}
.music-btn.playing{animation:spinBtn 3s linear infinite;}
@keyframes spinBtn{from{transform:rotate(0);}to{transform:rotate(360deg);}}

/* CONTAINER */
.container{
  position:relative;z-index:10;
  padding:40px 22px 220px;
  text-align:center;max-width:480px;margin:0 auto;
  animation:fadeUp 1s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}

/* AVATAR */
.avatar-wrap{position:relative;display:inline-block;margin-bottom:4px;}
.avatar{
  width:130px;height:130px;border-radius:50%;object-fit:cover;
  border:4px solid rgba(255,255,255,0.9);
  box-shadow:0 0 0 8px rgba(255,255,255,0.2),0 8px 32px rgba(0,0,0,0.18);
  animation:floatAvatar 3.5s ease-in-out infinite;display:block;
}
@keyframes floatAvatar{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.avatar-ring{position:absolute;inset:-10px;border-radius:50%;border:3px solid rgba(255,255,255,0.35);animation:ringPulse 3.5s ease-in-out infinite;}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.7;}50%{transform:scale(1.08);opacity:1;}}

/* TYPEWRITER TEXT */
.hi{font-size:16px;opacity:.85;margin-top:14px;letter-spacing:1px;min-height:24px;}
h1{font-size:28px;font-weight:900;margin-top:6px;text-shadow:0 2px 16px rgba(0,0,0,0.18);min-height:40px;}
.subtitle{margin-top:8px;font-size:15px;color:rgba(255,255,255,0.85);letter-spacing:1px;}
.cursor{display:inline-block;width:2px;height:1em;background:#fff;margin-left:2px;vertical-align:middle;animation:blink .7s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* SOCIAL */
.social{display:flex;justify-content:center;gap:14px;margin-top:22px;}
.social a{
  width:60px;height:60px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;overflow:hidden;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
}
.social a:hover{transform:translateY(-6px) scale(1.12);}
.social a svg{width:100%;height:100%;}

/* CARDS */
.cards{margin-top:18px;display:flex;flex-direction:column;gap:13px;}
.card{
  background:rgba(255,255,255,0.18);backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,255,255,0.35);border-radius:22px;
  padding:16px 18px;display:flex;align-items:center;justify-content:space-between;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,background .3s;
  box-shadow:0 4px 20px rgba(0,0,0,0.10);
  position:relative;overflow:hidden;
}
.card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 12px 32px rgba(0,0,0,0.18);background:rgba(255,255,255,0.26);}
.card:active{transform:scale(0.97);}
.card-left{display:flex;align-items:center;gap:12px;}
.card-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden;}
.card-icon svg{width:100%;height:100%;}
.card-text{font-size:15px;font-weight:700;text-align:left;}
.card-sub{font-size:12px;opacity:.75;margin-top:2px;}
.btn{
  background:linear-gradient(135deg,#FF6B35,#FF8C42);
  padding:10px 20px;border-radius:14px;color:white;text-decoration:none;
  font-weight:800;font-size:14px;letter-spacing:.5px;
  box-shadow:0 4px 14px rgba(255,107,53,0.4);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
  white-space:nowrap;
}
.btn:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 8px 22px rgba(255,107,53,0.55);}
.btn:active{transform:scale(0.95);}

/* WAVES */
.waves-wrap{position:fixed;bottom:0;left:0;width:100%;height:200px;pointer-events:none;z-index:5;overflow:hidden;}
.wave-svg{position:absolute;bottom:0;left:0;width:200%;height:100%;}
.w1{animation:wv1 8s linear infinite;}
.w2{animation:wv2 11s linear infinite;}
.w3{animation:wv3 14s linear infinite;}
@keyframes wv1{from{transform:translateX(0);}to{transform:translateX(-50%);}}
@keyframes wv2{from{transform:translateX(-50%);}to{transform:translateX(0);}}
@keyframes wv3{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* BUBBLES */
.bubble{position:fixed;border-radius:50%;background:rgba(255,255,255,0.25);border:1.5px solid rgba(255,255,255,0.5);pointer-events:none;z-index:6;animation:bubbleRise linear infinite;}
@keyframes bubbleRise{0%{transform:translateY(0);opacity:.8;}100%{transform:translateY(-220px);opacity:0;}}
</style>
</head>
<body>

<audio id="bgMusic" loop>

<script>
// MUSIC
var music = document.getElementById('bgMusic');
var musicBtn = document.getElementById('musicBtn');
var playing = false;

function tryPlay(){
  music.play().then(function(){
    playing = true;
    musicBtn.classList.add('playing');
  }).catch(function(){});
}
tryPlay();
document.addEventListener('touchstart', function(){ if(!playing) tryPlay(); }, {once:true});
document.addEventListener('click', function(){ if(!playing) tryPlay(); }, {once:true});
musicBtn.addEventListener('click', function(e){
  e.stopPropagation();
  if(playing){ music.pause(); playing=false; musicBtn.classList.remove('playing'); }
  else { music.play(); playing=true; musicBtn.classList.add('playing'); }
});

// TYPEWRITER
function typeWriter(el, text, speed, cb){
  el.innerHTML = '';
  var cursor = document.createElement('span');
  cursor.className = 'cursor';
  el.appendChild(cursor);
  var i = 0;
  function type(){
    if(i < text.length){
      el.insertBefore(document.createTextNode(text[i]), cursor);
      i++;
      setTimeout(type, speed);
    } else {
      cursor.remove();
      if(cb) cb();
    }
  }
  type();
}

setTimeout(function(){
  var hi = document.getElementById('hiText');
  var name = document.getElementById('nameText');
  typeWriter(hi, 'Hi . I am', 80, function(){
    setTimeout(function(){
      typeWriter(name, 'Kin top 1 hacker sever VN', 70);
    }, 200);
  });
}, 600);

// BUBBLES
function makeBubble(){
  var b = document.createElement('div');
  b.className = 'bubble';
  var size = 6 + Math.random()*14;
  b.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'vw;bottom:'+(60+Math.random()*80)+'px;animation-duration:'+(2.5+Math.random()*3)+'s;';
  document.body.appendChild(b);
  setTimeout(function(){ b.remove(); }, 6000);
}
setInterval(makeBubble, 400);

// RIPPLE
document.querySelectorAll('.card').forEach(function(card){
  card.addEventListener('click', function(e){
    var r = document.createElement('span');
    r.style.cssText = 'position:absolute;border-radius:50%;background:rgba(255,255,255,0.35);width:10px;height:10px;left:'+e.offsetX+'px;top:'+e.offsetY+'px;transform:scale(0);animation:rpl .5s ease forwards;pointer-events:none;';
    if(!document.getElementById('rplStyle')){
      var s=document.createElement('style');s.id='rplStyle';
      s.textContent='@keyframes rpl{to{transform:scale(30);opacity:0;}}';
      document.head.appendChild(s);
    }
    this.appendChild(r);
    setTimeout(function(){ r.remove(); }, 600);
  });
});
</script>
