<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bố Kiên iOS 🇻🇳</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --btn1:#FF6B35;
  --btn2:#FF8C42;
}

body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(170deg,#FFD580 0%,#87CEEB 30%,#4FC3F7 60%,#0288D1 100%);
  min-height:100vh;
  overflow-x:hidden;
  color:#fff;
  position:relative;
}

/* ========== SUN ========== */
.sun{
  position:fixed;top:28px;right:28px;
  width:90px;height:90px;
  background:radial-gradient(circle,#FFF176 30%,#FFD600 70%,#FF8F00 100%);
  border-radius:50%;
  box-shadow:0 0 0 18px rgba(255,230,80,0.18),0 0 0 36px rgba(255,230,80,0.09),0 0 60px #FFD600;
  animation:sunPulse 4s ease-in-out infinite;
  z-index:1;
}
@keyframes sunPulse{
  0%,100%{box-shadow:0 0 0 18px rgba(255,230,80,0.18),0 0 0 36px rgba(255,230,80,0.09),0 0 60px #FFD600;}
  50%{box-shadow:0 0 0 26px rgba(255,230,80,0.22),0 0 0 50px rgba(255,230,80,0.11),0 0 90px #FFD600;}
}
.sun::before{
  content:'';position:absolute;inset:-30px;
  background:repeating-conic-gradient(rgba(255,230,80,0.13) 0deg 10deg,transparent 10deg 20deg);
  border-radius:50%;
  animation:rotateSun 20s linear infinite;
}
@keyframes rotateSun{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ========== CLOUDS ========== */
.clouds{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:1;}
.cloud{position:absolute;background:rgba(255,255,255,0.82);border-radius:50px;filter:blur(2px);}
.cloud::before,.cloud::after{content:'';position:absolute;background:rgba(255,255,255,0.82);border-radius:50%;}
.cloud1{width:110px;height:35px;top:60px;left:-140px;animation:cloudMove 22s linear infinite;}
.cloud1::before{width:55px;height:55px;top:-28px;left:15px;}
.cloud1::after{width:38px;height:38px;top:-18px;left:55px;}
.cloud2{width:80px;height:26px;top:110px;left:-100px;animation:cloudMove 30s linear 8s infinite;opacity:.7;}
.cloud2::before{width:40px;height:40px;top:-20px;left:10px;}
.cloud2::after{width:30px;height:30px;top:-14px;left:40px;}
@keyframes cloudMove{from{transform:translateX(0);}to{transform:translateX(calc(100vw + 200px));}}

/* ========== BIRDS ========== */
.birds{position:fixed;top:80px;left:0;width:100%;pointer-events:none;z-index:1;}
.bird{position:absolute;width:22px;height:6px;border-top:3px solid rgba(255,255,255,0.7);border-radius:50% 50% 0 0/6px 6px 0 0;top:0;}
.bird::after{content:'';position:absolute;right:-11px;top:-3px;width:11px;height:6px;border-top:3px solid rgba(255,255,255,0.7);border-radius:50% 50% 0 0/6px 6px 0 0;}
.bird1{left:10%;animation:birdFly 18s linear infinite,birdFlap 0.5s ease-in-out infinite alternate;}
.bird2{left:20%;top:20px;animation:birdFly 24s linear 4s infinite,birdFlap 0.4s ease-in-out infinite alternate;}
.bird3{left:5%;top:35px;animation:birdFly 20s linear 10s infinite,birdFlap 0.6s ease-in-out infinite alternate;}
@keyframes birdFly{from{transform:translateX(0);}to{transform:translateX(110vw);}}
@keyframes birdFlap{from{transform:scaleY(1);}to{transform:scaleY(0.5);}}

/* ========== SPARKLES ========== */
.sparkle{position:fixed;width:6px;height:6px;background:#FFD600;border-radius:50%;pointer-events:none;z-index:2;animation:sparkleFade 3s ease-in-out infinite;}
@keyframes sparkleFade{0%,100%{opacity:0;transform:scale(0);}50%{opacity:1;transform:scale(1);}}

/* ========== CONTAINER ========== */
.container{
  position:relative;z-index:10;
  padding:40px 22px 220px;
  text-align:center;max-width:480px;margin:0 auto;
  animation:fadeUp 1s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}

/* ========== AVATAR ========== */
.avatar-wrap{position:relative;display:inline-block;margin-bottom:4px;}
.avatar{
  width:130px;height:130px;border-radius:50%;object-fit:cover;
  border:4px solid rgba(255,255,255,0.9);
  box-shadow:0 0 0 8px rgba(255,255,255,0.2),0 8px 32px rgba(0,0,0,0.18);
  animation:floatAvatar 3.5s ease-in-out infinite;display:block;
}
@keyframes floatAvatar{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.avatar-ring{position:absolute;inset:-10px;border-radius:50%;border:3px solid rgba(255,255,255,0.35);animation:ringPulse 3.5s ease-in-out infinite;}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.7;}50%{transform:scale(1.08);opacity:1;}}

/* ========== NAME ========== */
.hi{font-size:16px;opacity:.85;margin-top:14px;letter-spacing:1px;}
h1{font-size:30px;font-weight:900;margin-top:6px;text-shadow:0 2px 16px rgba(0,0,0,0.18);letter-spacing:.5px;}
.subtitle{margin-top:8px;font-size:15px;color:rgba(255,255,255,0.85);letter-spacing:1px;}

/* ========== SOCIAL ICONS ========== */
.social{display:flex;justify-content:center;gap:14px;margin-top:22px;}
.social a{
  width:58px;height:58px;border-radius:18px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  border:1.5px solid rgba(255,255,255,0.4);
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s;
  box-shadow:0 4px 16px rgba(0,0,0,0.12);
  overflow:hidden;padding:0;
}
.social a img{width:100%;height:100%;object-fit:cover;border-radius:16px;}
.social a:hover{transform:translateY(-6px) scale(1.12);box-shadow:0 10px 28px rgba(0,0,0,0.25);}

/* ========== MUSIC BTN ========== */
.music-btn{
  position:fixed;top:28px;left:20px;z-index:100;
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(10px);
  border:2px solid rgba(255,255,255,0.5);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  box-shadow:0 4px 14px rgba(0,0,0,0.15);
  animation:musicPulse 2s ease-in-out infinite;
}
@keyframes musicPulse{0%,100%{box-shadow:0 4px 14px rgba(0,0,0,0.15);}50%{box-shadow:0 4px 20px rgba(255,255,255,0.4);}}
.music-btn:hover{transform:scale(1.1);}
.music-btn.playing{animation:spin 3s linear infinite;}
@keyframes spin{from{transform:rotate(0);}to{transform:rotate(360deg);}}

/* ========== CARDS ========== */
.cards{margin-top:18px;display:flex;flex-direction:column;gap:13px;}
.card{
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,255,255,0.35);
  border-radius:22px;padding:16px 18px;
  display:flex;align-items:center;justify-content:space-between;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,background .3s;
  box-shadow:0 4px 20px rgba(0,0,0,0.10);
  animation:fadeUp 1s ease both;
}
.card:nth-child(1){animation-delay:.1s;}
.card:nth-child(2){animation-delay:.2s;}
.card:nth-child(3){animation-delay:.3s;}
.card:nth-child(4){animation-delay:.4s;}
.card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 12px 32px rgba(0,0,0,0.18);background:rgba(255,255,255,0.26);}
.card:active{transform:scale(0.97);}

.card-left{display:flex;align-items:center;gap:12px;}
.card-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;overflow:hidden;
}
.card-icon img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
.card-text{font-size:15px;font-weight:700;text-align:left;}
.card-sub{font-size:12px;opacity:.75;margin-top:2px;}

.btn{
  background:linear-gradient(135deg,var(--btn1),var(--btn2));
  padding:10px 20px;border-radius:14px;
  color:white;text-decoration:none;font-weight:800;font-size:14px;
  letter-spacing:.5px;box-shadow:0 4px 14px rgba(255,107,53,0.4);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
  white-space:nowrap;
}
.btn:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 8px 22px rgba(255,107,53,0.55);}
.btn:active{transform:scale(0.95);}

/* ========== WAVES ========== */
.waves-wrap{position:fixed;bottom:0;left:0;width:100%;height:200px;pointer-events:none;z-index:5;overflow:hidden;}
.wave-svg{position:absolute;bottom:0;left:0;width:200%;height:100%;}
.w1{animation:waveShift1 8s linear infinite;}
.w2{animation:waveShift2 11s linear infinite;}
.w3{animation:waveShift3 14s linear infinite;}
@keyframes waveShift1{from{transform:translateX(0);}to{transform:translateX(-50%);}}
@keyframes waveShift2{from{transform:translateX(-50%);}to{transform:translateX(0);}}
@keyframes waveShift3{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ========== BUBBLES ========== */
.bubble{
  position:fixed;border-radius:50%;
  background:rgba(255,255,255,0.25);
  border:1.5px solid rgba(255,255,255,0.5);
  pointer-events:none;z-index:6;
  animation:bubbleRise linear infinite;
}
@keyframes bubbleRise{0%{transform:translateY(0) scale(1);opacity:.8;}100%{transform:translateY(-220px) scale(1.3);opacity:0;}}
</style>
</head>

<body>

<div class="sun"></div>

<div class="clouds">
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
</div>

<div class="birds">
  <div class="bird bird1"></div>
  <div class="bird bird2"></div>
  <div class="bird bird3"></div>
</div>

<div class="sparkle" style="top:15%;left:8%;animation-delay:0s;"></div>
<div class="sparkle" style="top:25%;left:88%;animation-delay:1s;"></div>
<div class="sparkle" style="top:40%;left:5%;animation-delay:2s;"></div>
<div class="sparkle" style="top:10%;left:55%;animation-delay:1.5s;"></div>

<!-- Nút nhạc -->
<div class="music-btn" id="musicBtn" title="Bật/tắt nhạc">🎵</div>

<div class="container">

  <div class="avatar-wrap">
    <img src="./IMG_1477.jpeg" class="avatar" onerror="this.src='https://ui-avatars.com/api/?name=BK&background=0288d1&color=fff&size=130'">
    <div class="avatar-ring"></div>
  </div>

  <p class="hi">Hi, I am</p>
  <h1>Bố Kiên iOS 🇻🇳</h1>
  <p class="subtitle">App • Game • iOS • VIP</p>

  <!-- Social icons dùng logo thật -->
  <div class="social">
    <a href="https://www.facebook.com/share/1DfhahrvPr/?mibextid=wwXIfr" title="Facebook">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Facebook_Logo_%282019%29.png/600px-Facebook_Logo_%282019%29.png" alt="Facebook">
    </a>
    <a href="https://www.tiktok.com/@kien.228?_r=1&_t=ZS-96royoTC8NV" title="TikTok">
      <img src="https://upload.wikimedia.org/wikipedia/en/thumb/a/a9/TikTok_logo.svg/320px-TikTok_logo.svg.png" alt="TikTok" style="background:#000;padding:8px;border-radius:14px;">
    </a>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-left">
        <div class="card-icon">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Facebook_Logo_%282019%29.png/600px-Facebook_Logo_%282019%29.png" alt="Facebook">
        </div>
        <div class="card-text">Facebook cá nhân<div class="card-sub">Kết nối với mình nha</div></div>
      </div>
      <a class="btn" href="https://www.facebook.com/share/1DfhahrvPr/?mibextid=wwXIfr">Mở</a>
    </div>

    <div class="card">
      <div class="card-left">
        <div class="card-icon" style="background:#000;border-radius:12px;">
          <img src="https://upload.wikimedia.org/wikipedia/en/thumb/a/a9/TikTok_logo.svg/320px-TikTok_logo.svg.png" alt="TikTok" style="padding:6px;">
        </div>
        <div class="card-text">TikTok cá nhân<div class="card-sub">Follow mình đi bạn ơi</div></div>
      </div>
      <a class="btn" href="https://www.tiktok.com/@kien.228?_r=1&_t=ZS-96royoTC8NV">Mở</a>
    </div>

    <div class="card">
      <div class="card-left">
        <div class="card-icon">📦</div>
        <div class="card-text">Kho App VIP<div class="card-sub">App xịn miễn phí</div></div>
      </div>
      <a class="btn" href="#">Vào</a>
    </div>

    <div class="card">
      <div class="card-left">
        <div class="card-icon">🎮</div>
        <div class="card-text">Game Mod<div class="card-sub">Hack full tính năng</div></div>
      </div>
      <a class="btn" href="#">Vào</a>
    </div>
  </div>

</div>

<!-- Waves -->
<div class="waves-wrap">
  <svg class="wave-svg w1" viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,100 C180,160 360,40 540,100 C720,160 900,40 1080,100 C1260,160 1350,80 1440,100 L1440,200 L0,200 Z" fill="rgba(255,255,255,0.35)"/>
  </svg>
  <svg class="wave-svg w2" viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,120 C200,60 400,160 600,120 C800,60 1000,160 1200,120 C1320,96 1380,130 1440,120 L1440,200 L0,200 Z" fill="rgba(2,136,209,0.45)"/>
  </svg>
  <svg class="wave-svg w3" viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,140 C240,80 480,170 720,140 C960,110 1200,170 1440,140 L1440,200 L0,200 Z" fill="rgba(1,87,155,0.55)"/>
  </svg>
</div>

<audio id="bgMusic" loop>
  <source src="tiktok_audio.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById('bgMusic');
const btn = document.getElementById('musicBtn');
let playing = false;

// Tự động phát ngay khi trang load
function tryPlay(){
  music.play().then(()=>{
    playing = true;
    btn.textContent = '🎵';
    btn.classList.add('playing');
  }).catch(()=>{});
}
tryPlay();

// Nếu autoplay bị chặn → phát khi chạm màn hình lần đầu
document.addEventListener('touchstart', function(){
  if(!playing) tryPlay();
}, {once:true});
document.addEventListener('click', function(){
  if(!playing) tryPlay();
}, {once:true});

// Nút bật/tắt nhạc
btn.addEventListener('click', (e)=>{
  e.stopPropagation();
  if(playing){
    music.pause();
    playing = false;
    btn.textContent = '🔇';
    btn.classList.remove('playing');
  } else {
    music.play();
    playing = true;
    btn.textContent = '🎵';
    btn.classList.add('playing');
  }
});

// Bubbles
function makeBubble(){
  const b = document.createElement('div');
  b.className = 'bubble';
  const size = 6 + Math.random()*14;
  b.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;bottom:${60+Math.random()*80}px;animation-duration:${2.5+Math.random()*3}s;animation-delay:${Math.random()*2}s;`;
  document.body.appendChild(b);
  setTimeout(()=>b.remove(), 6000);
}
setInterval(makeBubble, 400);

// Ripple on cards
document.querySelectorAll('.card').forEach(card=>{
  card.addEventListener('click', function(e){
    const ripple = document.createElement('span');
    ripple.style.cssText = `position:absolute;border-radius:50%;background:rgba(255,255,255,0.35);width:10px;height:10px;left:${e.offsetX}px;top:${e.offsetY}px;transform:scale(0);animation:rippleAnim .5s ease forwards;pointer-events:none;`;
    if(!document.querySelector('#rippleStyle')){
      const st = document.createElement('style');
      st.id='rippleStyle';
      st.textContent='@keyframes rippleAnim{to{transform:scale(30);opacity:0;}}';
      document.head.appendChild(st);
    }
    this.style.position='relative';
    this.style.overflow='hidden';
    this.appendChild(ripple);
    setTimeout(()=>ripple.remove(),600);
  });
});
</script>

</body>
</html>
